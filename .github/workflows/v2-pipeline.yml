name: V2 Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "24 6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: v2-pipeline-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      MAX_SITES_OVERRIDE: "0"
      SITEMAP_WORKERS: ${{ vars.SITEMAP_WORKERS || '24' }}
      PAGE_WORKERS: ${{ vars.PAGE_WORKERS || '32' }}
      SEED_INITIAL_URLS: "0"
      MAX_RUNS_PER_DAY: ${{ vars.MAX_RUNS_PER_DAY || '3' }}
      SITEMAP_TIMEOUT: ${{ vars.SITEMAP_TIMEOUT || '20' }}
      SITEMAP_CONNECT_TIMEOUT: ${{ vars.SITEMAP_CONNECT_TIMEOUT || '8' }}
      PAGE_TIMEOUT: ${{ vars.PAGE_TIMEOUT || '20' }}
      HTTP_RETRIES: ${{ vars.HTTP_RETRIES || '2' }}
      MAX_NEW_URLS_PER_SITE: ${{ vars.MAX_NEW_URLS_PER_SITE || '100' }}
      MAX_SITEMAP_DOCUMENTS: ${{ vars.MAX_SITEMAP_DOCUMENTS || '120' }}
      PROGRESS_EVERY: ${{ vars.PROGRESS_EVERY || '25' }}
      RUN_BUDGET_SECONDS: ${{ vars.RUN_BUDGET_SECONDS || '18000' }}
      RUN_STOP_BUFFER_SECONDS: ${{ vars.RUN_STOP_BUFFER_SECONDS || '300' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crawl sitemap incrementally
        run: python -u scripts/crawl_v2.py

      - name: Build dashboard data
        run: python scripts/run_pipeline.py

      - name: Read crawl status
        id: crawl_status
        run: |
          python - <<'PY'
          import os
          import json
          from pathlib import Path
          state_path = Path("data/state/runtime/crawl_state.json")
          state = json.loads(state_path.read_text(encoding="utf-8")) if state_path.exists() else {}
          done = bool(state.get("done"))
          needs = bool(state.get("needs_continuation"))
          can_dispatch = bool(state.get("can_dispatch_continuation"))
          phase = str(state.get("phase", ""))
          processed = int(state.get("sitemap_processed", 0) or 0)
          total = int(state.get("total_sites", 0) or 0)
          runs_today = int(state.get("runs_started_today", 0) or 0)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"done={'true' if done else 'false'}\n")
              fh.write(f"needs_continuation={'true' if needs else 'false'}\n")
              fh.write(f"can_dispatch_continuation={'true' if can_dispatch else 'false'}\n")
              fh.write(f"phase={phase}\n")
              fh.write(f"processed={processed}\n")
              fh.write(f"total={total}\n")
              fh.write(f"runs_today={runs_today}\n")
          PY

      - name: Commit generated public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A catalog data public/data
          git diff --cached --quiet && exit 0
          git commit -m "Update V2 public data"
          git push

      - name: Dispatch continuation
        if: steps.crawl_status.outputs.done != 'true' && steps.crawl_status.outputs.needs_continuation == 'true' && steps.crawl_status.outputs.can_dispatch_continuation == 'true'
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/v2-pipeline.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
